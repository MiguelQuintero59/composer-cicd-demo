steps:
  - name: "python 3.12"
    entrypoint: "bash"
    args:
      - "-c"
      - |
      pip install -r requirements.txt
      pytest test/

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud composer environments storage dags import \
          --environment="${_COMPOSER_ENV}" \
          --location="${_REGION}" \
          --source="dags/"

substitutions:
  _COMPOSER_ENV: "test"
  _REGION: "us-central1"

options:
  logging: CLOUD_LOGGING_ONLY